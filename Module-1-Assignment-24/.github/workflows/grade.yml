name: Check Assignment 01

on:
  push:
    branches:
      - main

jobs:
  check-submission:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run submission
        run: python assignment01.py

      - name: Run grading tests
        run: python tests/test_assignment01.py
